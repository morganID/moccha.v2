<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Moccha - Remote System Management</title>
    <style>
        :root {
            --bg-primary: #0d1117;
            --bg-secondary: #161b22;
            --bg-tertiary: #21262d;
            --text-primary: #c9d1d9;
            --text-secondary: #8b949e;
            --accent: #58a6ff;
            --success: #3fb950;
            --warning: #d29922;
            --danger: #f85149;
            --border: #30363d;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
        }


        .app {
            display: block;
            min-height: 100vh;
        }

        .sidebar {
            position: fixed;
            left: 0;
            top: 0;
            width: 60px;
            height: 100vh;
            background: var(--bg-secondary);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            padding: 1rem 0;
            z-index: 100;
        }

        .sidebar-btn {
            width: 100%;
            padding: 0.75rem;
            background: none;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.25rem;
            font-size: 0.75rem;
        }

        .sidebar-btn:hover, .sidebar-btn.active {
            color: var(--accent);
        }

        .sidebar-btn svg {
            width: 24px;
            height: 24px;
        }

        .main-content {
            margin-left: 60px;
            padding: 1rem;
            min-height: 100vh;
        }

        .panel {
            display: none;
        }

        .panel.active {
            display: block;
        }

        .panel-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
        }

        .panel-title {
            font-size: 1.5rem;
            font-weight: 600;
        }

        #terminal-container {
            height: calc(100vh - 120px);
            background: var(--bg-secondary);
            border-radius: 8px;
            border: 1px solid var(--border);
            overflow: hidden;
        }

        #terminal {
            height: 100%;
            padding: 0.5rem;
            font-family: 'Fira Code', 'Consolas', monospace;
            font-size: 14px;
            line-height: 1.4;
        }

        .xterm {
            height: 100%;
            padding: 8px;
        }

        .xterm-viewport::-webkit-scrollbar {
            width: 8px;
        }

        .xterm-viewport::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 4px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 1rem;
            margin-bottom: 1rem;
        }

        .stat-card {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 1rem;
        }

        .stat-card h3 {
            color: var(--text-secondary);
            font-size: 0.875rem;
            margin-bottom: 0.5rem;
        }

        .stat-value {
            font-size: 1.5rem;
            font-weight: 600;
        }

        .stat-bar {
            height: 8px;
            background: var(--bg-tertiary);
            border-radius: 4px;
            margin-top: 0.5rem;
            overflow: hidden;
        }

        .stat-bar-fill {
            height: 100%;
            border-radius: 4px;
            transition: width 0.3s;
        }

        .process-table {
            width: 100%;
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 8px;
            overflow: hidden;
        }

        .process-table th, .process-table td {
            padding: 0.75rem 1rem;
            text-align: left;
        }

        .process-table th {
            background: var(--bg-tertiary);
            color: var(--text-secondary);
            font-weight: 500;
        }

        .process-table tr:hover {
            background: var(--bg-tertiary);
        }

        .file-manager {
            display: flex;
            gap: 1rem;
            height: calc(100vh - 120px);
        }

        .file-tree {
            width: 250px;
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 8px;
            overflow: auto;
        }

        .file-list {
            flex: 1;
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 8px;
            overflow: auto;
        }

        .file-item {
            display: flex;
            align-items: center;
            padding: 0.5rem 1rem;
            cursor: pointer;
            border-bottom: 1px solid var(--border);
        }

        .file-item:hover {
            background: var(--bg-tertiary);
        }

        .file-item.selected {
            background: var(--bg-tertiary);
            border-left: 2px solid var(--accent);
        }

        .file-item svg {
            width: 20px;
            height: 20px;
            margin-right: 0.5rem;
            color: var(--text-secondary);
        }

        .file-item.dir svg {
            color: var(--warning);
        }

        .file-path {
            padding: 0.75rem;
            background: var(--bg-tertiary);
            border-bottom: 1px solid var(--border);
            font-family: monospace;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .file-path button {
            padding: 0.25rem 0.5rem;
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 4px;
            color: var(--text-secondary);
            cursor: pointer;
        }

        .file-path button:hover {
            color: var(--accent);
        }

        .file-actions {
            padding: 0.75rem;
            border-bottom: 1px solid var(--border);
            display: flex;
            gap: 0.5rem;
        }

        .file-actions button {
            padding: 0.5rem 1rem;
            background: var(--bg-tertiary);
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--text-primary);
            cursor: pointer;
        }

        .file-actions button:hover {
            background: var(--accent);
            color: #fff;
        }

        .loading {
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 2rem;
            color: var(--text-secondary);
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
        }

        .modal.active {
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 1.5rem;
            width: 100%;
            max-width: 400px;
        }

        .modal h2 {
            margin-bottom: 1rem;
        }

        .modal-buttons {
            display: flex;
            gap: 0.5rem;
            margin-top: 1rem;
        }

        .modal-buttons button {
            flex: 1;
            padding: 0.5rem;
            border-radius: 6px;
            cursor: pointer;
        }

        .modal-buttons .btn-cancel {
            background: var(--bg-tertiary);
            border: 1px solid var(--border);
            color: var(--text-primary);
        }

        .modal-buttons .btn-confirm {
            background: var(--accent);
            border: none;
            color: #fff;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .spinner {
            width: 24px;
            height: 24px;
            border: 2px solid var(--border);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
    </style>
</head>
<body>

    <div class="app" id="app">
        <nav class="sidebar">
            <button class="sidebar-btn active" data-panel="terminal">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <polyline points="4,17 10,11 4,5"></polyline>
                    <line x1="12" y1="19" x2="20" y2="19"></line>
                </svg>
                Terminal
            </button>
            <button class="sidebar-btn" data-panel="system">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <rect x="2" y="3" width="20" height="14" rx="2"></rect>
                    <line x1="8" y1="21" x2="16" y2="21"></line>
                    <line x1="12" y1="17" x2="12" y2="21"></line>
                </svg>
                System
            </button>
            <button class="sidebar-btn" data-panel="files">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"></path>
                </svg>
                Files
            </button>
            <button class="sidebar-btn" onclick="logout()">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
                    <polyline points="16,17 21,12 16,7"></polyline>
                    <line x1="21" y1="12" x2="9" y2="12"></line>
                </svg>
                Logout
            </button>
        </nav>

        <main class="main-content">
            <div class="panel active" id="terminal-panel">
                <div class="panel-header">
                    <h2 class="panel-title">Terminal</h2>
                </div>
                <div id="terminal-container">
                    <div id="terminal"></div>
                </div>
            </div>

            <div class="panel" id="system-panel">
                <div class="panel-header">
                    <h2 class="panel-title">System Info</h2>
                    <button class="btn" onclick="loadSystemInfo()" style="width: auto; padding: 0.5rem 1rem;">Refresh</button>
                </div>
                <div class="stats-grid" id="statsGrid">
                    <div class="loading"><div class="spinner"></div></div>
                </div>
                <h3 style="margin: 1rem 0 0.5rem;">Processes</h3>
                <div style="overflow-x: auto;">
                    <table class="process-table" id="processTable">
                        <thead>
                            <tr>
                                <th>PID</th>
                                <th>Name</th>
                                <th>Status</th>
                                <th>CPU %</th>
                                <th>Memory %</th>
                            </tr>
                        </thead>
                        <tbody></tbody>
                    </table>
                </div>
            </div>

            <div class="panel" id="files-panel">
                <div class="panel-header">
                    <h2 class="panel-title">File Manager</h2>
                </div>
                <div class="file-manager">
                    <div class="file-tree" id="fileTree">
                        <div class="file-path" id="currentPath">
                            <button onclick="navigateUp()">↑</button>
                            <span>/</span>
                        </div>
                        <div class="file-actions">
                            <button onclick="showCreateModal('file')">New File</button>
                            <button onclick="showCreateModal('dir')">New Folder</button>
                            <button onclick="uploadFile()">Upload</button>
                        </div>
                        <div id="fileList"></div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <div class="modal" id="createModal">
        <div class="modal-content">
            <h2 id="modalTitle">Create</h2>
            <div class="form-group">
                <label id="modalLabel">Name</label>
                <input type="text" id="modalInput">
            </div>
            <div class="modal-buttons">
                <button class="btn-cancel" onclick="closeModal()">Cancel</button>
                <button class="btn-confirm" onclick="confirmCreate()">Create</button>
            </div>
        </div>
    </div>

    <input type="file" id="fileInput" style="display: none;">

    <script>
        alert('JavaScript loaded!');
        let token = '';
        let ws = null;
        let currentPath = '/';
        let selectedFile = null;
        let term = null;
        let createType = 'file';

        const API_BASE = window.location.origin;


        function showApp() {
            initTerminal();
            loadSystemInfo();
            loadFiles();
        }

        function logout() {
            if (ws) ws.close();
            window.location.reload();
        }

        async function apiCall(url, options = {}) {
            const res = await fetch(url, {
                ...options,
                headers: {
                    ...options.headers
                }
            });
            if (!res.ok) throw new Error(await res.text());
            return res.json();
        }

        document.querySelectorAll('.sidebar-btn[data-panel]').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.sidebar-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
                document.getElementById(`${btn.dataset.panel}-panel`).classList.add('active');
                
                if (btn.dataset.panel === 'system') loadSystemInfo();
                if (btn.dataset.panel === 'files') loadFiles();
            });
        });

        async function initTerminal() {
            const { Terminal } = await import('https://cdn.jsdelivr.net/npm/@xterm/xterm@5/+esm');
            const { FitAddon } = await import('https://cdn.jsdelivr.net/npm/@xterm/addon-fit@0.10/+esm');

            term = new Terminal({
                theme: {
                    background: '#161b22',
                    foreground: '#c9d1d9',
                    cursor: '#58a6ff',
                    selection: 'rgba(88, 166, 255, 0.3)'
                },
                fontFamily: "'Fira Code', Consolas, monospace",
                fontSize: 14,
                cursorBlink: true
            });

            const fitAddon = new FitAddon();
            term.loadAddon(fitAddon);
            term.open(document.getElementById('terminal'));
            fitAddon.fit();

            const wsProtocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
            const wsUrl = `${wsProtocol}//${window.location.host}/api/terminal/ws?cols=${term.cols}&rows=${term.rows}`;
            ws = new WebSocket(wsUrl);

            ws.onopen = () => {
                console.log('Terminal connected');
            };

            ws.onmessage = (e) => {
                if (typeof e.data === 'string') {
                    const msg = JSON.parse(e.data);
                    if (msg.type === 'pong') return;
                }
                term.write(new Uint8Array(e.data));
            };

            ws.onclose = () => {
                term.write('\r\n\x1b[33mConnection closed\x1b[0m\r\n');
            };

            term.onData(data => {
                if (ws && ws.readyState === WebSocket.OPEN) {
                    ws.send(data);
                }
            });

            term.onResize(({ cols, rows }) => {
                if (ws && ws.readyState === WebSocket.OPEN) {
                    ws.send(JSON.stringify({ type: 'resize', cols, rows }));
                }
            });

            window.addEventListener('resize', () => fitAddon.fit());
        }

        async function loadSystemInfo() {
            try {
                const info = await apiCall(`${API_BASE}/api/system/info`);
                const grid = document.getElementById('statsGrid');
                
                const getColor = (p) => p > 80 ? 'var(--danger)' : p > 50 ? 'var(--warning)' : 'var(--success)';
                
                grid.innerHTML = `
                    <div class="stat-card">
                        <h3>CPU</h3>
                        <div class="stat-value">${info.cpu.usage.toFixed(1)}%</div>
                        <div class="stat-bar"><div class="stat-bar-fill" style="width:${info.cpu.usage}%;background:${getColor(info.cpu.usage)}"></div></div>
                        <small style="color:var(--text-secondary)">${info.cpu.model}</small>
                    </div>
                    <div class="stat-card">
                        <h3>Memory</h3>
                        <div class="stat-value">${info.memory.usagePercent.toFixed(1)}%</div>
                        <div class="stat-bar"><div class="stat-bar-fill" style="width:${info.memory.usagePercent}%;background:${getColor(info.memory.usagePercent)}"></div></div>
                        <small style="color:var(--text-secondary)">${formatBytes(info.memory.used)} / ${formatBytes(info.memory.total)}</small>
                    </div>
                    <div class="stat-card">
                        <h3>Hostname</h3>
                        <div class="stat-value" style="font-size:1.2rem">${info.hostname}</div>
                        <small style="color:var(--text-secondary)">${info.os}</small>
                    </div>
                    <div class="stat-card">
                        <h3>Uptime</h3>
                        <div class="stat-value" style="font-size:1.2rem">${formatUptime(info.uptime)}</div>
                    </div>
                `;

                const processes = await apiCall(`${API_BASE}/api/system/processes`);
                const tbody = document.querySelector('#processTable tbody');
                tbody.innerHTML = processes.slice(0, 20).map(p => `
                    <tr>
                        <td>${p.pid}</td>
                        <td>${p.name}</td>
                        <td>${p.status}</td>
                        <td>${p.cpu.toFixed(1)}%</td>
                        <td>${p.memory.toFixed(1)}%</td>
                    </tr>
                `).join('');
            } catch (err) {
                console.error(err);
            }
        }

        async function loadFiles() {
            try {
                const data = await apiCall(`${API_BASE}/api/files${currentPath}`);
                const list = document.getElementById('fileList');
                
                function makeFileItem(f) {
                    var isDir = f.isDir;
                    var onclick = isDir ? "cd('" + f.name + "')" : "";
                    var ondblclick = isDir ? "cd('" + f.name + "')" : "viewFile('" + f.path + "')";
                    var svg = isDir 
                        ? '<path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"></path>'
                        : '<path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14,2 14,8 20,8"></polyline>';
                    var size = isDir ? '' : formatBytes(f.size);
                    return '<div class="file-item ' + (isDir ? 'dir' : '') + '" onclick="' + onclick + '" ondblclick="' + ondblclick + '">' +
                        '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">' + svg + '</svg>' +
                        '<span>' + f.name + '</span>' +
                        '<span style="margin-left:auto;color:var(--text-secondary)">' + size + '</span>' +
                        '</div>';
                }
                
                list.innerHTML = data.files.map(makeFileItem).join('');

                document.getElementById('currentPath').querySelector('span').textContent = currentPath || '/';
            } catch (err) {
                console.error(err);
            }
        }

        function cd(name) {
            if (name === '..') {
                const parts = currentPath.split('/').filter(Boolean);
                parts.pop();
                currentPath = '/' + parts.join('/');
            } else {
                currentPath = currentPath === '/' ? `/${name}` : `${currentPath}/${name}`;
            }
            loadFiles();
        }

        function navigateUp() {
            cd('..');
        }

        function showCreateModal(type) {
            createType = type;
            document.getElementById('modalTitle').textContent = type === 'dir' ? 'New Folder' : 'New File';
            document.getElementById('modalInput').value = '';
            document.getElementById('createModal').classList.add('active');
        }

        function closeModal() {
            document.getElementById('createModal').classList.remove('active');
        }

        async function confirmCreate() {
            const name = document.getElementById('modalInput').value;
            if (!name) return;
            
            const type = createType === 'dir' ? 'directory' : 'file';
            const path = currentPath === '/' ? name : `${currentPath}/${name}`;
            
            await apiCall(`${API_BASE}/api/files${path}?type=${type}`, { method: 'POST' });
            closeModal();
            loadFiles();
        }

        async function uploadFile() {
            document.getElementById('fileInput').click();
        }

        document.getElementById('fileInput').addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file) return;
            
            const formData = new FormData();
            formData.append('file', file);
            
            await apiCall(`${API_BASE}/api/files/upload${currentPath}`, {
                method: 'POST',
                body: formData
            });
            loadFiles();
        });

        function formatBytes(b) {
            if (b === 0) return '0 B';
            const k = 1024;
            const sizes = ['B', 'KB', 'MB', 'GB', 'TB'];
            const i = Math.floor(Math.log(b) / Math.log(k));
            return parseFloat((b / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i];
        }

        function formatUptime(s) {
            const d = Math.floor(s / 86400);
            const h = Math.floor((s % 86400) / 3600);
            const m = Math.floor((s % 3600) / 60);
            return `${d}d ${h}h ${m}m`;
        }

        // Start the app immediately without authentication
        showApp();
    </script>
</body>
</html>
